# Fly.io — servidor do jogo em São Paulo (GRU)
app = "sunfall-arena"
primary_region = "gru"

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"     # servidor de jogo fica sempre de pé
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
